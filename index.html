<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ayakkabı Mağazası</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

/* Navbar */

.navbar{
background:black;
padding:15px;
}

.navbar a{
color:white;
text-decoration:none;
margin:20px;
font-size:18px;
}

.navbar a:hover{
color:orange;
}

/* Banner */

.banner{
background:url("anasayfagorsel.jpg");
height:350px;
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
}

/* Kategoriler */

.kategoriler{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
}

.kategori{
background:white;
padding:20px;
width:200px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.kategori:hover{
transform:scale(1.1);
}

.kategori img{
width:100%;
border-radius:10px;
}

/* Ürünler */

.urunler{
display:flex;
justify-content:center;
gap:30px;
margin-top:50px;
flex-wrap:wrap;
}

.urun{
background:white;
width:220px;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.urun:hover{
transform:scale(1.05);
}

.urun img{
width:100%;
}

.fiyat{
color:green;
font-size:18px;
}

/* Footer */

.footer{
margin-top:50px;
background:black;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<!-- Navbar -->

<div class="navbar">
<a href="#">Ana Sayfa</a>
<a href="spor.html">Spor Ayakkabı</a>
<a href="botlar.html">Botlar</a>
<a href="klasik.html">Klasik Ayakkabı</a>
</div>

<!-- Banner -->

<div class="banner">
Yeni Sezon Ayakkabılar
</div>

<!-- Kategoriler -->

<h2 style="text-align:center;margin-top:40px;">Kategoriler</h2>

<div class="kategoriler">

<div class="kategori">
<img src="spor.jpg">
<h3>Spor</h3>
</div>

<div class="kategori">
<img src="bot.jpg">
<h3>Bot</h3>
</div>

<div class="kategori">
<img src="klasik.jpg">
<h3>Klasik</h3>
</div>

</div>

<!-- Ürünler -->



<!-- Footer -->

<div class="footer">
© 2026 Ayakkabı Mağazası
</div>

</body>
</html>
